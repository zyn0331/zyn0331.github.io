name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 카카오맵 키를 .env 파일로 주입 (레포 Settings > Secrets and variables > Actions 의
      # VITE_APP_KAKAOMAP_JAVASCRIPT_KEY 시크릿 사용. 시크릿이 없으면 빈 값으로 빌드됨)
      - name: Write .env
        run: |
          echo "VITE_APP_KAKAOMAP_JAVASCRIPT_KEY=${{ secrets.VITE_APP_KAKAOMAP_JAVASCRIPT_KEY }}" > .env
          if grep -q 'VITE_APP_KAKAOMAP_JAVASCRIPT_KEY=.\+' .env; then echo "kakao key: present"; else echo "kakao key: EMPTY"; fi

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
